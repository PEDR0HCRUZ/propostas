        { badge: 'CTA Final',     desc: 'Bloco de fechamento com WhatsApp, email e localização (Tianguá/CE).' },

const proposalId = uid();

const proposal = {
  id:        proposalId,
  client:    'IV Soluções Elétrica',
  niche:     'Engenharia Elétrica · Ceará',
  value:     'R$ 1.499',
  status:    'neg',
  date:      'Jun 2026',
  slug:      'iv-solucoes',
  createdAt: new Date().toISOString().slice(0, 10),
  updatedAt: new Date().toISOString().slice(0, 10),
  blocks:    BLOCKS,
  html:      null,
  published: false
};

// Salva na lista de propostas
try {
  const existing = JSON.parse(localStorage.getItem('pk_proposals') || '[]');
  // Remove se já existe para não duplicar
  const filtered = existing.filter(p => p.slug !== 'iv-solucoes');
  filtered.unshift(proposal);
  localStorage.setItem('pk_proposals', JSON.stringify(filtered));

  // Coloca os blocos no canvas do builder
  localStorage.setItem('pk_builder_v2', JSON.stringify(BLOCKS));
} catch(e) {}

// Redireciona para o builder com o ID da proposta
window.location.href = 'builder.html?id=' + proposalId;

})();
