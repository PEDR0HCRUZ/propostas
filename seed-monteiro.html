<p><strong>Camisetas com áudio:</strong> cada peça carrega uma frase da obra. No site, ao tocar o trecho correspondente, a frase ganha contexto completo. Não é um recurso de venda - é uma forma de fazer a mensagem durar mais do que o momento em que foi lida.</p>`

      note: 'Parcelamento em até 12x no cartão com juros da maquininha.'

  {
    id: uid(), type: 'passos',
    data: {
      heading: 'Próximos passos',
      steps: [
        { num: 'Passo 1', label: 'Aprovação do orçamento',  sub: 'Confirmação e pagamento de entrada' },

];

const proposalId = uid();

const proposal = {
  id:        proposalId,
  client:    'Monteiro',
  niche:     'Defesa da criança e adolescente',
  value:     'R$ 1.999',
  status:    'env',
  date:      'Mai 2026',
  slug:      'monteiro',
  createdAt: '2026-05-01',
  updatedAt: '2026-05-01',
  blocks:    BLOCKS,
  html:      null,
  published: false
};

try {
  const existing = JSON.parse(localStorage.getItem('pk_proposals') || '[]');
  const filtered = existing.filter(p => p.slug !== 'monteiro');
  filtered.unshift(proposal);
  localStorage.setItem('pk_proposals', JSON.stringify(filtered));
  localStorage.setItem('pk_builder_v2', JSON.stringify(BLOCKS));
} catch(e) {}

window.location.href = 'builder.html?id=' + proposalId;

})();
</script>

</html>
