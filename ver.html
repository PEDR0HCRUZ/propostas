<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Carregando proposta...</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: system-ui, sans-serif; background: #0D0D0D; color: #888;
         display: flex; align-items: center; justify-content: center; height: 100vh; }
  .spinner { width: 24px; height: 24px; border: 2px solid #222;
             border-top-color: #C4A265; border-radius: 50%;
             animation: spin .7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .err { text-align: center; }
  .err h2 { font-size: 18px; color: #CCC; margin-bottom: 8px; }
  .err p { font-size: 13px; color: #555; }
</style>
</head>
<body>
<div class="spinner" id="loader"></div>
<script>
const SUPABASE_URL = 'https://ifstkixcpssqtbzrklzc.supabase.co/rest/v1';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imlmc3RraXhjcHNzcXRienJrbHpjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA1MjQ5MjMsImV4cCI6MjA5NjEwMDkyM30.0SXA-dDOlltjz8pr6LYLhgZAsLf70kXu3vdlggKVuSc';

const slug = new URLSearchParams(location.search).get('s');

function showError(msg) {
  document.getElementById('loader').style.display = 'none';
  document.body.innerHTML = `<div class="err"><h2>Proposta não encontrada</h2><p>${msg}</p></div>`;
}

function buildLockedHTML(wa) {
  const waIcon = `<svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor" style="flex-shrink:0"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>`;
  const btn = wa
    ? `<a class="ctabtn" href="https://wa.me/${wa.replace(/\D/g,'')}" target="_blank">Entrar em contato&nbsp;${waIcon}</a>`
    : `<a class="ctabtn" href="mailto:pedro.h.kunz@gmail.com">Entrar em contato</a>`;
  return `<!DOCTYPE html><html lang="pt-BR"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Proposta desativada · Pedro Kunz</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:'Inter',system-ui,sans-serif;background:#0D0D0D;display:flex;align-items:center;justify-content:center;min-height:100vh;padding:24px}.box{text-align:center;max-width:340px}.lock-icon{font-size:72px;margin:0 auto 32px;opacity:.6}h1{font-size:21px;font-weight:800;color:#EDE7DA;margin-bottom:12px;letter-spacing:-.3px;line-height:1.3}p{font-size:13px;color:#444;line-height:1.9;margin-bottom:36px}.ctabtn{display:inline-flex;align-items:center;gap:8px;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.04);color:rgba(255,255,255,.75);text-decoration:none;padding:13px 24px;border-radius:8px;font-size:13px;font-weight:600;font-family:inherit}.credit{margin-top:48px;font-size:10px;color:#222;text-transform:uppercase;letter-spacing:2px}</style>
</head><body><div class="box">
<div class="lock-icon">🔒</div>
<h1>Esta proposta está congelada</h1>
<p>Este link foi desativado temporariamente.<br>Entre em contato para reativar.</p>
${btn}
<div class="credit">Pedro Kunz</div>
</div></body></html>`;
}

if (!slug) {
  showError('Nenhum slug fornecido na URL.');
} else {
  fetch(`${SUPABASE_URL}/propostas?slug=eq.${encodeURIComponent(slug)}&select=html,locked`, {
    headers: { 'Authorization': `Bearer ${SUPABASE_KEY}`, 'apikey': SUPABASE_KEY }
  })
  .then(r => r.json())
  .then(data => {
    if (!data || !data[0]) {
      showError(`Nenhuma proposta com slug "${slug}" encontrada.`);
      return;
    }
    const p = data[0];
    const html = p.locked ? buildLockedHTML('') : p.html;
    if (!html) { showError('Esta proposta ainda não tem conteúdo gerado.'); return; }
    document.open();
    document.write(html);
    document.close();
  })
  .catch(e => showError('Erro ao carregar: ' + e.message));
}
</script>
</body>
</html>
